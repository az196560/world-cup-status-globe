    - cron: "0 1 5 7 *" # 2026-07-05T01:00Z - RD32 @ RD32
    - cron: "0 0 6 7 *" # 2026-07-06T00:00Z - RD32 @ RD32
    - cron: "0 4 6 7 *" # 2026-07-06T04:00Z - RD32 @ RD32
    - cron: "0 23 6 7 *" # 2026-07-06T23:00Z - RD32 @ RD32
    - cron: "0 4 7 7 *" # 2026-07-07T04:00Z - RD32 @ RD32
    - cron: "0 20 7 7 *" # 2026-07-07T20:00Z - RD32 @ RD32
