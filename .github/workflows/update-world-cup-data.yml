    - cron: "0 4 2 7 *" # 2026-07-02T04:00Z - 3RD @ USA
    - cron: "0 23 2 7 *" # 2026-07-02T23:00Z - 2J @ 1H
    - cron: "0 3 3 7 *" # 2026-07-03T03:00Z - 2L @ 2K
    - cron: "0 7 3 7 *" # 2026-07-03T07:00Z - 3RD @ 1B
    - cron: "0 22 3 7 *" # 2026-07-03T22:00Z - 2G @ 2D
    - cron: "0 2 4 7 *" # 2026-07-04T02:00Z - 2H @ 1J
