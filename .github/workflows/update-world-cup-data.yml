  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: world-cup-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update scores from ESPN
        run: npm run update:worldcup

      - name: Check data diff
        id: diff
        run: |
          if git diff --quiet -- app/data/worldCupData.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate updated site
        if: steps.diff.outputs.changed == 'true'
        run: |
          npm run lint
          npm run build:pages

      - name: Commit updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/data/worldCupData.ts
          git commit -m "Update World Cup match data"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Upload Pages artifact
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages

  deploy:
    if: needs.update.outputs.changed == 'true'
    needs: update
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
